<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahliliy Statistika - Farg'ona VMMTB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #0f172a url('/assets/logo.png') no-repeat fixed center;
            background-size: 30%;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-card h2 {
            margin-top: 0;
            font-weight: 600;
            color: #818cf8;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            opacity: 0.8;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
            color: #818cf8;
        }

        @media (max-width: 1000px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="margin:0; font-size: 24px;">Viloyat Davomat Tahlili</h1>
                <p style="margin:5px 0 0 0; opacity:0.6; font-size: 14px;">Rahbariyat uchun maxsus oyna</p>
            </div>
            <div class="nav-links">
                <a href="/dashboard.html"><i class="fas fa-arrow-left"></i> Dashboardga qaytish</a>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h2><i class="fas fa-chart-bar"></i> Hududlar kesimida davomat (%)</h2>
                <canvas id="districtChart" style="max-height: 500px;"></canvas>
            </div>
            <div class="chart-card">
                <h2><i class="fas fa-chart-pie"></i> Sabablar ulushi</h2>
                <canvas id="reasonsChart" style="max-height: 500px;"></canvas>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('dashboard_token');
        if (!token) location.href = '/login.html';

        async function loadData() {
            try {
                const res = await fetch(`/api/stats/viloyat?date=${new Date().toISOString().split('T')[0]}`, {
                    headers: { 'Authorization': token }
                });
                if (res.status === 401) { location.href = '/login.html'; return; }
                const data = await res.json();

                renderCharts(data);
            } catch (e) { console.error(e); }
        }

        function renderCharts(data) {
            const labels = data.map(d => d.district);
            const percents = data.map(d => d.avg_percent);

            new Chart(document.getElementById('districtChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Davomat %',
                        data: percents,
                        backgroundColor: 'rgba(99, 102, 241, 0.6)',
                        borderColor: '#6366f1',
                        borderWidth: 2,
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#fff' } },
                        x: { grid: { display: false }, ticks: { color: '#fff' } }
                    },
                    animation: { duration: 2500, easing: 'easeOutQuart' }
                }
            });

            const totalSababli = data.reduce((a, b) => a + b.sababli, 0);
            const totalSababsiz = data.reduce((a, b) => a + b.sababsiz, 0);

            new Chart(document.getElementById('reasonsChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Sababli', 'Sababsiz'],
                    datasets: [{
                        data: [totalSababli, totalSababsiz],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#fff', padding: 20, font: { size: 14 } } }
                    },
                    animation: { animateScale: true, duration: 2000 }
                }
            });
        }

        loadData();
    </script>
</body>

</html>
